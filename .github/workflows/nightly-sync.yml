name: Nightly Sync from Public

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add and Fetch Public Remote
        run: |
          git remote add public https://github.com/0xPolygonHermez/cdk-erigon.git
          git fetch public zkevm

      - name: Merge Public zkevm into Private zkevm
        run: |
          git checkout zkevm
          if git merge --no-edit public/zkevm; then
            git push origin zkevm
          else
            echo "Merge conflict in zkevm branch. Aborting push."
            exit 0
          fi

      - name: Update Gateway Branch
        run: |
          git checkout gateway
          if git merge --no-edit zkevm; then
            git push origin gateway
          else
            echo "Merge conflict in gateway branch. Aborting push."
            exit 0
          fi
