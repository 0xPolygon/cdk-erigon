# This workflow runs the Bats E2E tests for aggkit.
# Copied from agglayer/aggkit/.github/workflows/test-e2e.yml
name: Bats E2E Tests Type 1 aggkit bridge

on:
  pull_request:
    branches:
      - project/pp2
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-aggkit-image:
    # uses: agglayer/aggkit/.github/workflows/build-aggkit-image.yml@2364b97d3186c5bd3b8ea618863219c58c0e49bb
    uses: ./.github/workflows/build-aggkit-image.yml # Use the local version of the workflow
    with:
      go-version: 1.24.x
      docker-image-name: aggkit
      repository: agglayer/aggkit
      ref:        2364b97d3186c5bd3b8ea618863219c58c0e49bb
    secrets: inherit

  read-aggkit-args:
    name: Read aggkit args
    runs-on: ubuntu-latest
    outputs:
      # single l2 network (fork 12, pessimistic)
      kurtosis-cdk-args-single-fork12-pessimistic: ${{ steps.read-args.outputs.fork12_pessimistic_args }}
    steps:
      - name: Checkout aggkit
        uses: actions/checkout@v4
        with:
          repository: agglayer/aggkit
          ref: 2364b97d3186c5bd3b8ea618863219c58c0e49bb # feat/new-bridge-service
          # token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read kurtosis-cdk-args from file
        id: read-args
        run: |
          # single l2 network (fork 12, pessimistic)
          CONTENT=$(jq -c '
          .args.cdk_erigon_node_image        = "cdk-erigon-type1:local"   |
          .args.gas_token_enabled            = false                      |
          .args.enable_aggkit_claim_sponsor  = true                       |
          .deployment_stages.deploy_l2_contracts = false
          ' ./.github/test_e2e_single_chain_fork12_pessimistic_args.json)
          echo "fork12_pessimistic_args=${CONTENT}" >> $GITHUB_OUTPUT

  test-single-l2-network-fork12-pessimistic:
    name: Single L2 chain tests (pessimistic)
    needs:
      - build-aggkit-image
      - read-aggkit-args
      - build-erigon
    uses: ./.github/workflows/aggkit-e2e-single-chain.yml # Replace with aggkit's version if PR is merged to pass kurtosis-cdk-repo
    # uses: agglayer/e2e/.github/workflows/aggkit-e2e-single-chain.yml@9769842d0b8bf1fa7fa1135b686d2c7ba08eb73f # This is a ref to my commit, which is not merged yet
    # uses: agglayer/e2e/.github/workflows/aggkit-e2e-single-chain.yml@44083e2c2d2a5e84164edbbda0128253f56a6f55 # This is a ref to the latest commit in the main branch
    secrets: inherit
    with:
      kurtosis-cdk-repo: "gateway-fm/kurtosis-cdk"
      kurtosis-cdk-ref: feat/add-type1-flags-to-config-template
      agglayer-e2e-ref: 9769842d0b8bf1fa7fa1135b686d2c7ba08eb73f
      kurtosis-cdk-enclave-name: aggkit
      kurtosis-cdk-args: ${{ needs.read-aggkit-args.outputs.kurtosis-cdk-args-single-fork12-pessimistic }}
      test-name: "test-single-l2-network-fork12-pessimistic"

  check-single-l2-network-fork12-pessimistic-tests-result:
    name: Check results for single l2 network (pessimistic)
    needs:
      - test-single-l2-network-fork12-pessimistic
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: ${{ contains(fromJSON('["failure", "cancelled"]'), needs.test-single-l2-network-fork12-pessimistic.result) }}

  build-tools:
    name: Build aggsender find imported bridge tool
    needs:
      - build-aggkit-image
    runs-on: amd-runner-2204
    steps:
      - name: Checkout aggkit
        uses: actions/checkout@v4
        with:
          repository: agglayer/aggkit
          ref: 2364b97d3186c5bd3b8ea618863219c58c0e49bb # feat/new-bridge-service
          # token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.x

      - name: Build Aggsender Find Imported Bridge
        run: make build-tools

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: aggsender_find_imported_bridge
          path: ./target/aggsender_find_imported_bridge

  # The only way to make it available in a reusable workflow is to upload it to the registry
  # So I avoid that and build it in the same workflow
  build-erigon:
    if: false # Disabled
    runs-on: ubuntu-latest
    outputs:
      image-tar: erigon.tar
    steps:
      - name: Checkout cdk-erigon
        uses: actions/checkout@v4
        with:
          repository: 0xPolygon/cdk-erigon
          ref: project/pp2
          path: cdk-erigon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cdk-erigon image
        run: |
          cd cdk-erigon
          docker buildx build --load -t cdk-erigon-type1:local .

      - name: Save Docker image to tarball
        run: docker save cdk-erigon-type1:local -o erigon.tar

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: erigon-image
          path: erigon.tar
